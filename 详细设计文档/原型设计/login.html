<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理端登录 - 快递代取与驿站管理系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
    }
    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      color: white;
    }
    .left-panel h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    .left-panel p {
      font-size: 16px;
      opacity: 0.9;
      text-align: center;
      line-height: 1.6;
    }
    .right-panel {
      width: 480px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.1);
    }
    .login-header {
      margin-bottom: 40px;
    }
    .login-header h2 {
      font-size: 24px;
      color: #303133;
      margin-bottom: 8px;
    }
    .login-header p {
      color: #909399;
      font-size: 14px;
    }
    .login-form .el-form-item {
      margin-bottom: 24px;
    }
    .login-form .el-input__wrapper {
      height: 44px;
    }
    .login-btn {
      width: 100%;
      height: 44px;
      font-size: 16px;
    }
    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .copyright {
      text-align: center;
      color: #909399;
      font-size: 12px;
      margin-top: 40px;
    }
    @media (max-width: 768px) {
      .left-panel {
        display: none;
      }
      .right-panel {
        width: 100%;
        padding: 40px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <h1>📦 快递代取与驿站管理系统</h1>
    <p>
      智慧末端驿站全流程管理平台<br>
      包裹入库 → 通知触达 → 出库核销 → 数据统计
    </p>
  </div>
  
  <div class="right-panel">
    <div class="login-header">
      <h2>管理端登录</h2>
      <p>请输入您的账号和密码登录系统</p>
    </div>
    
    <el-form class="login-form" label-position="top">
      <el-form-item label="用户名">
        <el-input 
          placeholder="请输入用户名" 
          prefix-icon="User"
          size="large"
        />
      </el-form-item>
      
      <el-form-item label="密码">
        <el-input 
          type="password" 
          placeholder="请输入密码" 
          prefix-icon="Lock"
          size="large"
          show-password
        />
      </el-form-item>
      
      <div class="form-footer">
        <el-checkbox>记住密码</el-checkbox>
        <el-link type="primary">忘记密码？</el-link>
      </div>
      
      <el-button type="primary" class="login-btn" size="large">
        登 录
      </el-button>
    </el-form>
    
    <div class="copyright">
      Copyright © 2024 快递代取与驿站管理系统
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script>
    const app = Vue.createApp({});
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
