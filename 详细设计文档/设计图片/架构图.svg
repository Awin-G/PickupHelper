<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <!-- 背景 -->
  <rect width="800" height="520" fill="#f5f5f5" rx="10"/>
  
  <!-- 标题 -->
  <rect x="200" y="15" width="400" height="40" fill="#333" rx="6"/>
  <text x="400" y="42" text-anchor="middle" fill="white" font-size="18" font-weight="bold">快递代取与驿站管理系统 - 总体架构</text>
  
  <!-- 终端展示层 -->
  <rect x="30" y="75" width="740" height="90" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,5" rx="8"/>
  <text x="45" y="95" fill="#666" font-size="12">终端展示层</text>
  
  <rect x="50" y="105" width="180" height="50" fill="#2196F3" rx="6"/>
  <text x="140" y="135" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Taro 小程序</text>
  <text x="140" y="150" text-anchor="middle" fill="white" font-size="10">收件人 / 跑腿员</text>
  
  <rect x="310" y="105" width="180" height="50" fill="#2196F3" rx="6"/>
  <text x="400" y="135" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PureAdmin 管理端</text>
  <text x="400" y="150" text-anchor="middle" fill="white" font-size="10">驿站 / 系统管理员</text>
  
  <rect x="570" y="105" width="180" height="50" fill="#90CAF9" rx="6"/>
  <text x="660" y="135" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">IoT 自助终端</text>
  <text x="660" y="150" text-anchor="middle" fill="#666" font-size="10">(预留)</text>
  
  <!-- 箭头 -->
  <polygon points="400,165 390,180 410,180" fill="#666"/>
  
  <!-- API网关 -->
  <rect x="250" y="185" width="300" height="45" fill="#FF9800" rx="6"/>
  <text x="400" y="213" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Nginx API 网关 / 负载均衡</text>
  
  <!-- 箭头 -->
  <polygon points="400,230 390,245 410,245" fill="#666"/>
  
  <!-- 应用服务层 -->
  <rect x="30" y="250" width="740" height="120" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,5" rx="8"/>
  <text x="45" y="270" fill="#666" font-size="12">应用服务层 (Go)</text>
  
  <rect x="50" y="280" width="100" height="40" fill="#4CAF50" rx="4"/>
  <text x="100" y="305" text-anchor="middle" fill="white" font-size="11">用户服务</text>
  
  <rect x="160" y="280" width="100" height="40" fill="#4CAF50" rx="4"/>
  <text x="210" y="305" text-anchor="middle" fill="white" font-size="11">包裹服务</text>
  
  <rect x="270" y="280" width="100" height="40" fill="#4CAF50" rx="4"/>
  <text x="320" y="305" text-anchor="middle" fill="white" font-size="11">取件服务</text>
  
  <rect x="380" y="280" width="100" height="40" fill="#4CAF50" rx="4"/>
  <text x="430" y="305" text-anchor="middle" fill="white" font-size="11">代取服务</text>
  
  <rect x="490" y="280" width="100" height="40" fill="#4CAF50" rx="4"/>
  <text x="540" y="305" text-anchor="middle" fill="white" font-size="11">货架服务</text>
  
  <rect x="600" y="280" width="150" height="40" fill="#4CAF50" rx="4"/>
  <text x="675" y="305" text-anchor="middle" fill="white" font-size="11">通知 / 统计 / 定时</text>
  
  <!-- 箭头 -->
  <polygon points="400,370 390,385 410,385" fill="#666"/>
  
  <!-- 数据存储层 -->
  <rect x="30" y="390" width="740" height="110" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" rx="8"/>
  <text x="45" y="410" fill="#666" font-size="12">数据存储层</text>
  
  <rect x="80" y="420" width="140" height="60" fill="#9C27B0" rx="6"/>
  <text x="150" y="448" text-anchor="middle" fill="white" font-size="13" font-weight="bold">MySQL</text>
  <text x="150" y="468" text-anchor="middle" fill="white" font-size="10">主数据存储</text>
  
  <rect x="250" y="420" width="140" height="60" fill="#9C27B0" rx="6"/>
  <text x="320" y="448" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Redis</text>
  <text x="320" y="468" text-anchor="middle" fill="white" font-size="10">缓存 / 分布式锁</text>
  
  <rect x="420" y="420" width="140" height="60" fill="#9C27B0" rx="6"/>
  <text x="490" y="448" text-anchor="middle" fill="white" font-size="13" font-weight="bold">消息队列</text>
  <text x="490" y="468" text-anchor="middle" fill="white" font-size="10">异步通知 / 入库</text>
  
  <rect x="590" y="420" width="140" height="60" fill="#9C27B0" rx="6"/>
  <text x="660" y="448" text-anchor="middle" fill="white" font-size="13" font-weight="bold">OSS / 本地</text>
  <text x="660" y="468" text-anchor="middle" fill="white" font-size="10">日志 / 备份</text>
</svg>
